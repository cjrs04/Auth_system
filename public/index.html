<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="card">

  <!-- Auth Forms -->
  <div id="authSection">
    <div class="logo">
      <h1>Welcome</h1>
      <p>Sign in or create an account</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Log In</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- Login -->
    <div id="loginForm" class="form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn" id="loginBtn" onclick="login()">Log In</button>
    </div>

    <!-- Signup -->
    <div id="signupForm" class="form" style="display:none">
      <div class="row">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="firstName" placeholder="Jane" />
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="lastName" placeholder="Doe" />
        </div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="••••••••" />
        <span class="hint">Min 8 chars · uppercase · number · symbol</span>
      </div>
      <button class="btn" id="signupBtn" onclick="signup()">Create Account</button>
    </div>
  </div>

  <!-- Dashboard (shown after login) -->
  <div id="dashboard" class="dashboard">
    <div class="logo">
      <div class="avatar" id="avatarInitials"></div>
      <h1 id="welcomeMsg"></h1>
      <p>You are signed in</p>
    </div>
    <div class="info-box" id="userInfo"></div>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>

</div>

<script src="frontauth.js"></script>
</body>
</html>
